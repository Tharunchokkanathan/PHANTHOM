<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>PHANTOM V</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@300;400;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0a12;--floor:#1a1a2e;--sky1:#0f0f1a;--sky2:#16213e;--accent:#e94560;--cyan:#00d4ff;--ui:'Inter',sans-serif;--title:'Orbitron',sans-serif;--mono:'Share Tech Mono',monospace}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:#fff;font-family:var(--ui);display:flex;justify-content:center;align-items:center;height:100vh;overflow:hidden;user-select:none}
#game-wrapper{position:relative;width:800px;height:500px;background:#0a0a12;overflow:hidden;border:1px solid rgba(255,255,255,0.05)}
canvas{display:block;position:absolute;z-index:5;width:100%;height:100%}
#ui-layer{position:absolute;top:0;left:0;width:100%;height:100%;z-index:10;pointer-events:none}
.screen{position:absolute;top:0;left:0;width:100%;height:100%;display:none;flex-direction:column;align-items:center;justify-content:center;background:rgba(10,10,18,0.97);pointer-events:all}
.screen.active{display:flex}
h1,h2,h3{font-family:var(--title);letter-spacing:2px}
button{padding:12px 30px;margin:8px;background:transparent;border:1px solid rgba(255,255,255,0.3);color:#fff;font-family:var(--title);cursor:pointer;transition:all .2s;text-transform:uppercase;letter-spacing:2px;font-size:12px}
button:hover{background:#fff;color:#000}
button:disabled{opacity:.3;cursor:not-allowed}
.title-glitch{font-size:52px;letter-spacing:12px;margin-bottom:5px;color:#fff}
.subtitle{font-family:var(--mono);opacity:.5;margin-bottom:30px;font-size:13px}
.player-stats{margin-bottom:20px;text-align:center;font-family:var(--mono);font-size:13px}
.rank-display{font-weight:bold;font-size:16px;margin-top:4px;color:var(--accent)}
.sp-display{margin-top:4px}
#sanctum-screen{justify-content:flex-start;padding:25px}
.sanctum-header{width:100%;display:flex;justify-content:space-between;align-items:center;margin-bottom:15px;border-bottom:1px solid rgba(255,255,255,0.08);padding-bottom:12px}
.tabs{display:flex;gap:8px;margin-bottom:15px}
.tab-btn{border:none;border-bottom:2px solid transparent;padding:8px 16px;font-size:11px}
.tab-btn.active{border-bottom-color:var(--accent);background:rgba(233,69,96,0.1)}
.tab-content{width:100%;height:340px;display:none;overflow-y:auto}
.tab-content.active{display:flex;flex-direction:column;gap:8px}
.item-card{display:flex;justify-content:space-between;align-items:center;padding:12px;background:rgba(255,255,255,0.02);border:1px solid rgba(255,255,255,0.06)}
.item-card.equipped{border-color:var(--accent);background:rgba(233,69,96,0.08)}
.item-info h3{margin-bottom:3px;font-size:13px}
.item-info p{font-family:var(--mono);font-size:11px;opacity:.6}
#hud{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;padding:15px;display:none;z-index:10}
.hud-top{display:flex;justify-content:space-between;align-items:flex-start}
.hp-container{display:none;flex-direction:column;width:180px}
.fighter-name{font-family:var(--title);font-size:11px;margin-bottom:4px;letter-spacing:2px}
.hp-bar{width:100%;height:6px;background:rgba(255,255,255,0.08);position:relative}
.hp-fill{height:100%;transition:width .15s}
#player-hp{background:#fff}
#phantom-hp{background:var(--accent)}
.center-hud{text-align:center}
.round-text{font-family:var(--title);font-size:13px;letter-spacing:3px;opacity:.7}
.corruption-container{position:absolute;bottom:15px;left:50%;transform:translateX(-50%);text-align:center;width:250px;display:none}
.corruption-bar{height:2px;background:rgba(233,69,96,0.15);margin-top:4px;overflow:hidden}
#corruption-fill{height:100%;background:var(--accent);width:0%;transition:width .5s}
.corr-label{font-size:9px;letter-spacing:3px;color:var(--accent);opacity:.4}
#rage-overlay{position:absolute;top:0;left:0;width:100%;height:100%;box-shadow:inset 0 0 0 rgba(233,69,96,0);pointer-events:none;transition:box-shadow .3s;z-index:8}
#rage-overlay.active{box-shadow:inset 0 0 120px rgba(233,69,96,0.35)}
#rage-alert{position:absolute;top:80px;left:50%;transform:translateX(-50%);color:var(--accent);font-family:var(--title);font-size:20px;letter-spacing:5px;opacity:0;z-index:11}
#rage-alert.active{animation:flicker .2s infinite;opacity:1}
@keyframes flicker{0%{opacity:1}50%{opacity:.2}100%{opacity:.9}}
#cutscene-screen{justify-content:center;background:#000;transition:opacity .5s}
#cinematic-text{font-family:var(--title);font-size:22px;letter-spacing:6px;text-align:center;color:#fff;max-width:600px;line-height:1.8}
#run-ui{position:absolute;top:15px;right:15px;font-family:var(--mono);display:none;text-align:right;pointer-events:none;z-index:10;font-size:12px;opacity:.7}
#taunt-display{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-family:var(--title);font-size:20px;letter-spacing:4px;color:var(--accent);opacity:0;pointer-events:none;z-index:11;text-shadow:0 0 20px rgba(233,69,96,0.5)}
.mobile-controls{display:none;position:absolute;bottom:15px;left:0;width:100%;justify-content:space-between;padding:0 15px;z-index:50;pointer-events:none}
.dpad,.action-pad{display:flex;gap:8px;pointer-events:all}
.mob-btn{width:48px;height:48px;border-radius:50%;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.15);font-size:10px;display:flex;align-items:center;justify-content:center}
@media(max-width:820px){#game-wrapper{width:100vw;height:100vh;border:none}.mobile-controls{display:flex}}
</style>
</head>
<body>
<div id="game-wrapper">
<div id="rage-overlay"></div>
<canvas id="gameCanvas"></canvas>
<div id="hud">
<div class="hud-top">
<div class="hp-container"><div class="fighter-name">YOU</div><div class="hp-bar"><div id="player-hp" class="hp-fill" style="width:100%"></div></div></div>
<div class="center-hud"><div id="round-display" class="round-text">ZONE 1</div></div>
<div class="hp-container" style="align-items:flex-end"><div class="fighter-name">PHANTOM</div><div class="hp-bar"><div id="phantom-hp" class="hp-fill" style="width:100%"></div></div></div>
</div>
<div id="rage-alert">RAGE MODE</div>
<div id="taunt-display"></div>
<div class="corruption-container"><div class="corr-label">CORRUPTION</div><div class="corruption-bar"><div id="corruption-fill"></div></div></div>
<div class="mobile-controls">
<div class="dpad"><button class="mob-btn" id="btn-left">◀</button><button class="mob-btn" id="btn-right">▶</button></div>
<div class="action-pad"><button class="mob-btn" id="btn-atk">▲</button><button class="mob-btn" id="btn-def">▼</button><button class="mob-btn" id="btn-dash">⟫</button></div>
</div>
</div>
<div id="run-ui"><div id="run-dist">0M</div><div id="run-orbs" style="margin-top:3px">0 ◆</div></div>
<div id="ui-layer">
<div id="main-menu" class="screen active">
<h1 class="title-glitch">PHANTOM V</h1>
<p class="subtitle">RUN. FIGHT. EVOLVE.</p>
<div class="player-stats"><div id="menu-rank" class="rank-display">UNRANKED</div><div id="menu-sp" class="sp-display">0 SP</div><div style="font-size:11px;margin-top:8px;opacity:.4">W: <span id="menu-w">0</span> | L: <span id="menu-l">0</span></div></div>
<button id="btn-enter-arena">COMMENCE RUN</button>
<button id="btn-sanctum">THE SANCTUM</button>
</div>
<div id="sanctum-screen" class="screen">
<div class="sanctum-header"><h2>THE SANCTUM</h2><div id="sanctum-sp" class="sp-display" style="font-size:18px">0 SP</div></div>
<div class="tabs"><button class="tab-btn active" data-target="tab-weapons">WEAPONS</button><button class="tab-btn" data-target="tab-lore">LORE</button><button class="tab-btn" data-target="tab-arenas">ARENAS</button><button class="tab-btn" data-target="tab-titles">TITLES</button></div>
<div id="tab-weapons" class="tab-content active"></div><div id="tab-lore" class="tab-content"></div><div id="tab-arenas" class="tab-content"></div><div id="tab-titles" class="tab-content"></div>
<button id="btn-back-main" style="margin-top:15px">RETURN</button>
</div>
<div id="cutscene-screen" class="screen"><div id="cinematic-text"></div></div>
<div id="result-screen" class="screen">
<h1 id="result-title" style="margin-bottom:10px">DEFEATED</h1>
<p id="result-msg" style="margin-bottom:15px;font-family:var(--mono);font-size:13px;opacity:.6"></p>
<div id="result-sp" class="sp-display" style="margin-bottom:25px;font-size:18px;color:var(--cyan)">+0 SP</div>
<button id="btn-return-menu">RETURN</button>
</div>
</div>
</div>
<script>
// ═══ STORAGE ═══
const DB_KEY='phantomV_save';
const DEFAULT_STATE={totalSP:0,wins:0,losses:0,rankIndex:0,unlockedWeapons:['wpn_default'],unlockedLore:[],unlockedArenas:['arena_default'],unlockedTitles:['title_default'],equippedWeapon:'wpn_default',equippedArena:'arena_default',equippedTitle:'title_default',phantomProfile:{dodgeLeft:0,dodgeRight:0,attackCounts:[],blockCount:0,rageActivations:0,openings:[],roundsObserved:0}};
const RANKS=[{name:'UNRANKED',req:0},{name:'FRACTURED',req:3},{name:'HOLLOW',req:8},{name:'PHANTOM',req:15},{name:'VOID',req:25}];
const ITEM_DATA={weapons:[{id:'wpn_default',name:'Iron Blade',cost:0,desc:'Balanced'},{id:'wpn_void',name:'Void Cleaver',cost:100,desc:'+15% dmg, -10% speed'},{id:'wpn_echo',name:'Echo Gauntlet',cost:200,desc:'Copies last PHANTOM dmg'},{id:'wpn_edge',name:'Phantom Edge',cost:350,desc:'20% phase through block'},{id:'wpn_shatter',name:'Shatter Staff',cost:500,desc:'Breaks guard on 3rd hit'}],lore:[{id:'lore_1',name:'Entry I',cost:50,desc:'"PHANTOM was not built. It was left behind."'},{id:'lore_2',name:'Entry II',cost:100,desc:'"Every player who fought here fed it something."'},{id:'lore_3',name:'Entry III',cost:200,desc:'"It does not want to win. It wants to become."'},{id:'lore_4',name:'Entry IV',cost:300,desc:'"You are not the first."'},{id:'lore_5',name:'Entry V',cost:500,desc:'"PHANTOM is what remains when a fighter stops growing."'}],arenas:[{id:'arena_default',name:'Default',cost:0,desc:'Standard'},{id:'arena_void',name:'VOID',cost:150,desc:'Pure black, white floor'},{id:'arena_crimson',name:'CRIMSON',cost:250,desc:'Deep red, embers'},{id:'arena_static',name:'STATIC',cost:400,desc:'Glitch static'},{id:'arena_abyss',name:'ABYSS',cost:600,desc:'Infinite depth'}],titles:[{id:'title_default',name:'Unranked',cost:0,desc:'Default'},{id:'title_hunter',name:'Ghost Hunter',cost:100,desc:'3 wins',cond:s=>s.wins>=3},{id:'title_breaker',name:'Mirror Breaker',cost:250,desc:'5 wins',cond:s=>s.wins>=5},{id:'title_slayer',name:'Phantom Slayer',cost:600,desc:'10 wins',cond:s=>s.wins>=10},{id:'title_void',name:'VOID',cost:1000,desc:'20 wins',cond:s=>s.wins>=20}]};
class StorageManager{
constructor(){this.load()}
load(){const d=localStorage.getItem(DB_KEY);this.state=d?{...DEFAULT_STATE,...JSON.parse(d)}:{...DEFAULT_STATE};this.checkRank()}
save(){localStorage.setItem(DB_KEY,JSON.stringify(this.state))}
addSP(a){this.state.totalSP+=a;this.save()}
spendSP(a){if(this.state.totalSP>=a){this.state.totalSP-=a;this.save();return true}return false}
checkRank(){let r=0;for(let i=RANKS.length-1;i>=0;i--)if(this.state.wins>=RANKS[i].req){r=i;break}this.state.rankIndex=r}
unlockItem(cat,id,cost){const k='unlocked'+cat.charAt(0).toUpperCase()+cat.slice(1);const list=this.state[k];if(!list.includes(id)&&this.spendSP(cost)){list.push(id);this.save();return true}return false}
logMatch(w){if(w)this.state.wins++;else this.state.losses++;this.checkRank();this.save()}
}
const storage=new StorageManager();

// ═══ UI ═══
const Screens={main:document.getElementById('main-menu'),sanctum:document.getElementById('sanctum-screen'),hud:document.getElementById('hud'),cutscene:document.getElementById('cutscene-screen'),result:document.getElementById('result-screen')};
const equipMap={weapons:'equippedWeapon',arenas:'equippedArena',titles:'equippedTitle'};
function showScreen(n){Object.values(Screens).forEach(s=>s.classList.remove('active'));if(n==='hud')Screens.hud.style.display='block';else{Screens.hud.style.display='none';if(Screens[n])Screens[n].classList.add('active')}}
function updateMainMenu(){document.getElementById('menu-sp').textContent=storage.state.totalSP+' SP';document.getElementById('menu-w').textContent=storage.state.wins;document.getElementById('menu-l').textContent=storage.state.losses;document.getElementById('menu-rank').textContent=RANKS[storage.state.rankIndex].name}
function renderSanctumTab(cat){const con=document.getElementById('tab-'+cat);con.innerHTML='';const items=ITEM_DATA[cat];const ul=storage.state['unlocked'+cat.charAt(0).toUpperCase()+cat.slice(1)];let eq=cat==='lore'?null:storage.state[equipMap[cat]];document.getElementById('sanctum-sp').textContent=storage.state.totalSP+' SP';items.forEach(item=>{const unlocked=ul.includes(item.id),equipped=eq===item.id;const card=document.createElement('div');card.className='item-card'+(equipped?' equipped':'');let act='';if(unlocked){if(cat==='lore')act='<span style="opacity:.5">UNLOCKED</span>';else act=`<button class="equip-btn" data-id="${item.id}" ${equipped?'disabled':''}>${equipped?'EQUIPPED':'EQUIP'}</button>`}else{let can=storage.state.totalSP>=item.cost;if(item.cond&&!item.cond(storage.state))can=false;act=`<button class="buy-btn" data-id="${item.id}" data-cost="${item.cost}" ${can?'':'disabled'}>${item.cost} SP</button>`}card.innerHTML=`<div class="item-info"><h3>${item.name}</h3><p>${cat==='lore'&&!unlocked?'???':item.desc}</p></div><div>${act}</div>`;con.appendChild(card)});con.querySelectorAll('.buy-btn').forEach(b=>{b.onclick=e=>{if(storage.unlockItem(cat,e.target.dataset.id,+e.target.dataset.cost))renderSanctumTab(cat)}});con.querySelectorAll('.equip-btn').forEach(b=>{b.onclick=e=>{storage.state[equipMap[cat]]=e.target.dataset.id;storage.save();renderSanctumTab(cat)}})}
document.getElementById('btn-sanctum').onclick=()=>{showScreen('sanctum');renderSanctumTab('weapons')};
document.getElementById('btn-back-main').onclick=()=>{updateMainMenu();showScreen('main')};
document.querySelectorAll('.tab-btn').forEach(b=>{b.onclick=()=>{document.querySelectorAll('.tab-btn').forEach(x=>x.classList.remove('active'));document.querySelectorAll('.tab-content').forEach(x=>x.classList.remove('active'));b.classList.add('active');document.getElementById(b.dataset.target).classList.add('active');renderSanctumTab(b.dataset.target.split('-')[1])}});
document.getElementById('btn-return-menu').onclick=()=>{updateMainMenu();showScreen('main')};
updateMainMenu();

// ═══ INPUT ═══
class InputHandler{
constructor(){this.keys={};this.jumpPressed=false;
window.addEventListener('keydown',e=>{this.keys[e.code]=true;e.preventDefault()});
window.addEventListener('keyup',e=>{this.keys[e.code]=false});
const bind=(id,key)=>{const b=document.getElementById(id);if(!b)return;b.addEventListener('touchstart',e=>{e.preventDefault();this.keys[key]=true});b.addEventListener('touchend',e=>{e.preventDefault();this.keys[key]=false});b.addEventListener('mousedown',e=>{e.preventDefault();this.keys[key]=true});b.addEventListener('mouseup',e=>{e.preventDefault();this.keys[key]=false})};
bind('btn-left','ArrowLeft');bind('btn-right','ArrowRight');bind('btn-atk','Space');bind('btn-def','ShiftLeft');bind('btn-dash','KeyQ')}
isPressed(c){return!!this.keys[c]}
wantJump(){return this.isPressed('Space')||this.isPressed('ArrowUp')||this.isPressed('KeyW')}
wantSlide(){return this.isPressed('ShiftLeft')||this.isPressed('ShiftRight')||this.isPressed('ArrowDown')||this.isPressed('KeyS')}
wantLeft(){return this.isPressed('ArrowLeft')||this.isPressed('KeyA')}
wantRight(){return this.isPressed('ArrowRight')||this.isPressed('KeyD')}
wantDash(){return this.isPressed('KeyQ')}
}

// ═══ CANVAS ═══
const canvas=document.getElementById('gameCanvas');
const W=800,H=500;
canvas.width=W;canvas.height=H;
const ctx=canvas.getContext('2d');
const FLOOR=420;
const ACT={IDLE:'idle',ATTACK:'attack',DODGE:'dodge',DEFEND:'defend'};

// ═══ PARTICLES ═══
class ParticleSystem{
constructor(){this.p=[];this.shakeT=0;this.shakeM=0}
shake(m,t){this.shakeM=m;this.shakeT=t}
burst(x,y,col,n){for(let i=0;i<n;i++){const a=Math.random()*Math.PI*2,s=2+Math.random()*5;this.p.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s-2,life:1,color:col,size:1.5+Math.random()*3})}}
update(dt){if(this.shakeT>0)this.shakeT-=dt;for(let i=this.p.length-1;i>=0;i--){let p=this.p[i];p.x+=p.vx;p.y+=p.vy;p.vy+=3*dt;p.life-=dt*1.8;if(p.life<=0)this.p.splice(i,1)}}
applyShake(c){if(this.shakeT>0){c.translate((Math.random()-.5)*this.shakeM,(Math.random()-.5)*this.shakeM)}}
draw(c){this.p.forEach(p=>{c.globalAlpha=p.life;c.fillStyle=p.color;c.fillRect(p.x-p.size/2,p.y-p.size/2,p.size,p.size)});c.globalAlpha=1}
}

// ═══ BATHROOM-SIGN HUMAN SILHOUETTE ═══
// Draws a thick rounded limb (pill shape)
function drawPill(ctx,x1,y1,x2,y2,w){
    const ang=Math.atan2(y2-y1,x2-x1);
    const px=Math.cos(ang+Math.PI/2)*w;
    const py=Math.sin(ang+Math.PI/2)*w;
    ctx.beginPath();
    ctx.arc(x1,y1,w,ang+Math.PI/2,ang-Math.PI/2);
    ctx.lineTo(x2-px,y2-py);
    ctx.arc(x2,y2,w,ang-Math.PI/2,ang+Math.PI/2);
    ctx.lineTo(x1+px,y1+py);
    ctx.closePath();
    ctx.fill();
}

// Draws the torso+shoulders+arms as one connected shape
function drawBody(ctx,shoulderY,hipY,shoulderW,waistW,armEndY1,armEndY2,armOff1,armOff2,armW){
    // One continuous filled shape: left hand → left arm → left shoulder → right shoulder → right arm → right hand → hip right → hip left
    ctx.beginPath();
    // Left arm (rounded end)
    ctx.arc(-shoulderW+armOff1,armEndY1,armW,Math.PI,0,true);
    // Up to left shoulder
    ctx.lineTo(-shoulderW+armOff1+armW,shoulderY);
    // Across shoulders (flat top)
    ctx.lineTo(shoulderW+armOff2+armW,shoulderY);
    // Down right arm (rounded end)
    ctx.arc(shoulderW+armOff2,armEndY2,armW,0,Math.PI,true);
    // Back up to right shoulder inner
    ctx.lineTo(shoulderW+armOff2-armW,shoulderY);
    // Down to right hip
    ctx.lineTo(waistW,hipY);
    // Across bottom (hip)
    ctx.lineTo(-waistW,hipY);
    // Up to left shoulder inner
    ctx.lineTo(-shoulderW+armOff1-armW,shoulderY);
    // Close back to left arm top
    ctx.closePath();
    ctx.fill();
}

function drawStickFigure(ctx, x, y, opts){
    const {color='#000',runCycle=0,isSliding=false,isJumping=false,action='idle',attackProgress=0,isDefending=false,flip=false,scale=1}=opts;
    ctx.save();
    ctx.translate(x,y);
    if(flip)ctx.scale(-1,1);
    ctx.scale(scale,scale);
    ctx.fillStyle=color;ctx.strokeStyle=color;ctx.lineCap='round';ctx.lineJoin='round';

    // === PROPORTIONS (bathroom sign style) ===
    const headR=9;
    const neckY=-60;       // top of neck
    const shoulderY=-50;   // shoulder line
    const hipY=-18;        // hip/crotch
    const shoulderW=14;    // half-width at shoulders
    const waistW=6;        // half-width at hip
    const armW=4.5;        // arm thickness (radius)
    const legW=5;          // leg thickness (radius)
    const legLen=18;       // full leg length

    if(isSliding){
        // === SLIDE: body horizontal, legs forward ===
        ctx.save();
        ctx.translate(0,20);ctx.rotate(-0.12);
        // Head
        ctx.beginPath();ctx.arc(20,-28,headR,0,Math.PI*2);ctx.fill();
        // Body horizontal (simplified)
        drawPill(ctx,-8,-20,18,-20,7);
        // Front leg extended
        drawPill(ctx,-8,-18,-22,-14,legW);
        // Back leg tucked
        drawPill(ctx,-2,-18,-12,-10,legW);
        // Arm trailing back
        drawPill(ctx,14,-22,26,-28,armW);
        ctx.restore();

    } else if(isJumping){
        // === JUMP: knees tucked, arms up ===
        // Head
        ctx.beginPath();ctx.arc(0,neckY,headR,0,Math.PI*2);ctx.fill();
        // Body
        drawBody(ctx,shoulderY,hipY+6,shoulderW-2,waistW,shoulderY-4,shoulderY-2,-2,2,armW);
        // Legs tucked up (knees bent)
        drawPill(ctx,-5,hipY+6,-10,hipY+2,legW);
        drawPill(ctx,-10,hipY+2,-8,hipY+14,legW-1);
        drawPill(ctx,5,hipY+6,8,hipY+3,legW);
        drawPill(ctx,8,hipY+3,6,hipY+15,legW-1);

    } else if(action===ACT.ATTACK){
        // === ATTACK: lunge with sword swing ===
        const t=attackProgress;
        // Head
        ctx.beginPath();ctx.arc(3,neckY+2,headR,0,Math.PI*2);ctx.fill();
        // Body leaning forward
        ctx.save();ctx.rotate(0.15);
        drawBody(ctx,shoulderY+2,hipY+2,shoulderW-1,waistW,shoulderY+18,shoulderY+14,2,-4,armW);
        ctx.restore();
        // Lunge legs
        drawPill(ctx,4,hipY+2,14,0,legW);
        drawPill(ctx,-4,hipY+2,-14,0,legW);
        // Sword arm — swings in arc
        const sAng=-Math.PI*0.8+t*Math.PI*1.2;
        const handX=3+Math.cos(sAng)*20;
        const handY=shoulderY+4+Math.sin(sAng)*20;
        drawPill(ctx,3,shoulderY+4,handX,handY,armW);
        // Sword blade
        const sLen=28;
        const bladeX=handX+Math.cos(sAng)*sLen;
        const bladeY=handY+Math.sin(sAng)*sLen;
        ctx.lineWidth=3;ctx.beginPath();ctx.moveTo(handX,handY);ctx.lineTo(bladeX,bladeY);ctx.stroke();
        // Crossguard
        const cg=sAng+Math.PI/2;
        ctx.lineWidth=4;ctx.beginPath();
        ctx.moveTo(handX+Math.cos(cg)*5,handY+Math.sin(cg)*5);
        ctx.lineTo(handX-Math.cos(cg)*5,handY-Math.sin(cg)*5);
        ctx.stroke();

    } else if(isDefending){
        // === BLOCK: wide stance, shield arm ===
        ctx.beginPath();ctx.arc(0,neckY+2,headR,0,Math.PI*2);ctx.fill();
        // Body crouched
        drawBody(ctx,shoulderY+2,hipY+2,shoulderW,waistW+2,shoulderY+16,shoulderY+18,-2,2,armW);
        // Wide legs
        drawPill(ctx,-5,hipY+2,-12,0,legW);
        drawPill(ctx,5,hipY+2,12,0,legW);
        // Shield arm forward
        drawPill(ctx,shoulderW-2,shoulderY+4,shoulderW+8,shoulderY+2,armW);
        // Shield arc
        ctx.lineWidth=3.5;ctx.globalAlpha=0.5;
        ctx.beginPath();ctx.arc(shoulderW+10,shoulderY+10,14,-Math.PI*0.5,Math.PI*0.5);ctx.stroke();
        ctx.globalAlpha=1;

    } else {
        // === RUN CYCLE: animated bathroom-sign figure ===
        const cycle=runCycle;
        const legSwing=Math.sin(cycle)*0.55;
        const armSwing=Math.sin(cycle)*12;
        const bounce=Math.abs(Math.sin(cycle))*2;

        // Head
        ctx.beginPath();ctx.arc(0,neckY+bounce,headR,0,Math.PI*2);ctx.fill();

        // Body+Arms as one connected shape
        // Arms swing: front arm goes down, back arm goes down opposite
        const lArmEnd=shoulderY+18-armSwing;
        const rArmEnd=shoulderY+18+armSwing;
        drawBody(ctx,shoulderY+bounce,hipY+bounce,shoulderW,waistW,lArmEnd+bounce,rArmEnd+bounce,0,0,armW);

        // === FRONT LEG (pillar with rounded cap) ===
        const fLegAng=Math.PI/2+legSwing;
        const fFootX=Math.cos(fLegAng)*legLen;
        let fFootY=hipY+bounce+Math.sin(fLegAng)*legLen;
        if(fFootY>0)fFootY=0;
        drawPill(ctx,0,hipY+bounce,fFootX,fFootY,legW);

        // === BACK LEG ===
        const bLegAng=Math.PI/2-legSwing;
        const bFootX=Math.cos(bLegAng)*legLen;
        let bFootY=hipY+bounce+Math.sin(bLegAng)*legLen;
        if(bFootY>0)bFootY=0;
        drawPill(ctx,0,hipY+bounce,bFootX,bFootY,legW);
    }
    ctx.restore();
}

// ═══ PARALLAX CITY BACKGROUND ═══
function generateBuildings(count,minH,maxH,minW,maxW){
    const buildings=[];
    let x=0;
    for(let i=0;i<count;i++){
        const w=minW+Math.random()*(maxW-minW);
        const h=minH+Math.random()*(maxH-minH);
        buildings.push({x,w,h});
        x+=w+Math.random()*10;
    }
    return buildings;
}
const bgLayers=[
    {buildings:generateBuildings(30,60,160,30,70),speed:0.1,color:'#0d0d15',totalW:0},
    {buildings:generateBuildings(25,40,120,25,55),speed:0.25,color:'#111122',totalW:0},
    {buildings:generateBuildings(20,30,80,20,45),speed:0.5,color:'#1a1a30',totalW:0}
];
bgLayers.forEach(l=>{l.totalW=l.buildings.reduce((s,b)=>Math.max(s,b.x+b.w),0)+50});

function drawParallax(ctx,offset){
    bgLayers.forEach(layer=>{
        ctx.fillStyle=layer.color;
        const ox=(offset*layer.speed)%layer.totalW;
        layer.buildings.forEach(b=>{
            let bx=b.x-ox;
            while(bx<-b.w)bx+=layer.totalW;
            while(bx>W)bx-=layer.totalW;
            if(bx>-b.w&&bx<W){
                ctx.fillRect(bx,FLOOR-b.h,b.w,b.h);
                // Window lights
                ctx.fillStyle=layer.color==='#1a1a30'?'rgba(233,69,96,0.08)':'rgba(255,255,255,0.03)';
                for(let wy=FLOOR-b.h+8;wy<FLOOR-5;wy+=12){
                    for(let wx=bx+4;wx<bx+b.w-4;wx+=10){
                        if(Math.random()>0.6)ctx.fillRect(wx,wy,4,6);
                    }
                }
                ctx.fillStyle=layer.color;
            }
        });
    });
}

// ═══ ENTITY ═══
class Entity{
constructor(x,color){
this.x=x;this.y=FLOOR;this.w=20;this.h=52;this.color=color;this.health=100;
this.action=ACT.IDLE;this.vx=0;this.vy=0;
this.isJumping=false;this.canDoubleJump=false;this.isSliding=false;
this.baseSpeed=200;this.baseDmg=10;this.speedMult=1;this.dmgMult=1;
this.attackCooldown=0;this.dodgeCooldown=0;this.isDefending=false;this.flashTime=0;
this.runCycle=0;
}
get totalSpeed(){return this.baseSpeed*this.speedMult}
get totalDmg(){return this.baseDmg*this.dmgMult}
takeDamage(a){if(this.isDefending)a*=0.4;this.health=Math.max(0,this.health-a);this.flashTime=0.12;return a}
updateArena(dt){
if(this.attackCooldown>0)this.attackCooldown-=dt;
if(this.dodgeCooldown>0)this.dodgeCooldown-=dt;
if(this.flashTime>0)this.flashTime-=dt;
this.x=Math.max(30,Math.min(W-30,this.x+this.vx*dt*this.totalSpeed));
this.runCycle+=dt*8*Math.abs(this.vx);
}
updateRunner(dt){
this.vy+=1400*dt;this.y+=this.vy*dt;
if(this.y>=FLOOR){this.y=FLOOR;this.vy=0;this.isJumping=false;this.canDoubleJump=true}
if(this.isSliding)this.h=28;else this.h=52;
}
draw(ctx,flip){
ctx.save();
if(this.flashTime>0)ctx.globalAlpha=0.4;
const atkProg=this.action===ACT.ATTACK?1-Math.max(0,this.attackCooldown/0.4):0;
drawStickFigure(ctx,this.x,this.y,{color:this.color,runCycle:this.runCycle,isSliding:this.isSliding,isJumping:this.isJumping,action:this.action,attackProgress:atkProg,isDefending:this.isDefending,flip:flip,scale:1});
ctx.restore();
}
}

// ═══ PHANTOM AI ═══
class PhantomAI{
constructor(p,pl){this.phantom=p;this.player=pl;this.prof=storage.state.phantomProfile;this.timer=0;this.arenaLevel=1;this.tauntTimer=0}
showTaunt(msg){
const el=document.getElementById('taunt-display');el.textContent=msg;el.style.opacity='1';
setTimeout(()=>el.style.opacity='0',2000);
}
update(dt){
this.timer-=dt;this.tauntTimer-=dt;
let corr=Math.min(100,this.prof.roundsObserved*15+this.prof.dodgeLeft*2+this.prof.blockCount*2);
document.getElementById('corruption-fill').style.width=corr+'%';
if(this.timer>0)return;
this.phantom.vx=0;this.phantom.isDefending=false;this.phantom.action=ACT.IDLE;
const dist=this.player.x-this.phantom.x,ad=Math.abs(dist);
if(this.arenaLevel===1){
if(ad>60){this.phantom.vx=Math.sign(dist)*0.4;this.timer=0.6}
else if(Math.random()<0.25&&this.phantom.attackCooldown<=0){this.phantom.action=ACT.ATTACK;this.phantom.attackCooldown=0.9;this.timer=0.9}else this.timer=0.5;
}else if(this.arenaLevel===2){
if(ad>60){this.phantom.vx=Math.sign(dist)*0.7;this.timer=0.35}
else{if(this.player.action===ACT.ATTACK&&Math.random()<0.3){this.phantom.isDefending=true;this.timer=0.4}
else if(Math.random()<0.45&&this.phantom.attackCooldown<=0){this.phantom.action=ACT.ATTACK;this.phantom.attackCooldown=0.6;this.timer=0.6}else this.timer=0.3}
}else{
const ag=this.arenaLevel*0.22;
if(ad>60){if(Math.random()<ag){this.phantom.vx=Math.sign(dist);this.timer=0.2}else{this.phantom.isDefending=Math.random()>0.5;this.timer=0.35}}
else{if(this.player.action===ACT.ATTACK&&this.player.attackCooldown>0){if(Math.random()<ag){this.phantom.isDefending=true;this.timer=0.3}else{this.phantom.x-=Math.sign(dist)*55;this.phantom.action=ACT.DODGE;this.timer=0.4;if(this.tauntTimer<=0&&Math.random()<0.3){this.showTaunt('PREDICTABLE');this.tauntTimer=8}}}
else{if(Math.random()<ag&&this.phantom.attackCooldown<=0){
if(this.arenaLevel>=4&&this.prof.rageActivations>=2&&this.player.health>25&&this.player.health<40){this.phantom.isDefending=true;this.timer=0.5;if(this.tauntTimer<=0){this.showTaunt('YOU RAGE. I WAIT.');this.tauntTimer=10}return}
if(this.arenaLevel>=4&&this.player.isDefending&&this.prof.blockCount>10)this.phantom.dmgMult=2;else this.phantom.dmgMult=1;
this.phantom.action=ACT.ATTACK;this.phantom.attackCooldown=0.4;this.timer=0.4}
else{this.phantom.isDefending=true;this.timer=0.3}}}
}
}
}

class GameMaster{
constructor(){
this.input=new InputHandler();this.vfx=new ParticleSystem();
this.lastTime=performance.now();this.state='menu';this.zone=1;this.raf=null;
this.player=new Entity(180,'#ffffff');
this.phantom=new Entity(600,'#e94560');

this.runTime=0;this.spawnTimer=0;

startGame(){this.zone=1;this.player.health=100;this.rageActive=false;this.rageTimer=0;this.player.speedMult=1;this.player.dmgMult=1;document.getElementById('rage-overlay').classList.remove('active');this.startRunZone();if(!this.raf)this.loop(performance.now())}
showCinematic(text,cb){this.state='cutscene';showScreen('cutscene');document.getElementById('cinematic-text').textContent=text;setTimeout(()=>{showScreen('hud');cb()},3000)}

// ═══ RUN ZONE ═══
startRunZone(){
const texts=['ZONE 1 — THE CORRIDOR','ZONE 2 — THE PROVING','ZONE 3 — THE DEPTHS','ZONE 4 — THE GAUNTLET','ZONE 5 — THE VOID CORRIDOR'];
this.showCinematic(texts[this.zone-1]||'ZONE '+this.zone,()=>{
this.state='run';this.runDist=0;this.orbCount=0;this.obstacles=[];this.orbs=[];
this.player.x=180;this.player.y=FLOOR;this.player.isJumping=false;this.player.isSliding=false;this.player.vy=0;this.player.runCycle=0;
this.gameOver=false;this.spawnTimer=0;this.runTime=0;
document.getElementById('run-ui').style.display='block';
document.querySelectorAll('.hp-container').forEach(e=>e.style.display='none');
document.querySelector('.corruption-container').style.display='none';
document.getElementById('round-display').textContent='ZONE '+this.zone;
})}

spawnObstacle(){
const types=['gap','low','high'];
const t=types[Math.floor(Math.random()*types.length)];
const o={x:W+50,type:t};
if(t==='gap'){o.w=60+this.zone*5}
else if(t==='low'){o.w=25;o.h=25+Math.random()*10} // short barriers you jump over
else{o.w=40;o.h=50;o.y=FLOOR-o.h} // tall barriers you slide under
this.obstacles.push(o);
if(Math.random()<0.4)this.orbs.push({x:W+80,y:FLOOR-90-Math.random()*40,active:true});
}

updateRun(dt){
if(this.gameOver)return;
this.runTime+=dt;
const speed=250+this.zone*25;
this.bgOff+=speed*dt;
this.runDist+=(speed*dt)/80;
this.player.runCycle+=dt*10;
const target=40+this.zone*15;
document.getElementById('run-dist').textContent=Math.floor(this.runDist)+'M / '+target+'M';
document.getElementById('run-orbs').textContent=this.orbCount+' ◆';
if(this.runDist>=target){storage.addSP(20);this.startArena();return}

// Jump input with edge detection
if(this.input.wantJump()){
if(!this.player.isJumping&&this.player.y>=FLOOR){this.player.vy=-580;this.player.isJumping=true;this.player.isSliding=false;this.input.keys['Space']=false;this.input.keys['ArrowUp']=false;this.input.keys['KeyW']=false}
else if(this.player.isJumping&&this.player.canDoubleJump&&this.player.vy>-150){this.player.vy=-480;this.player.canDoubleJump=false;this.input.keys['Space']=false;this.input.keys['ArrowUp']=false;this.input.keys['KeyW']=false}
}
this.player.isSliding=this.input.wantSlide()&&!this.player.isJumping;
this.player.updateRunner(dt);

// Spawn obstacles — generous spacing
this.spawnTimer-=dt;
if(this.spawnTimer<=0){this.spawnObstacle();this.spawnTimer=2.0-this.zone*0.1+Math.random()*1.0}

// Check obstacles
for(let i=this.obstacles.length-1;i>=0;i--){
let o=this.obstacles[i];o.x-=speed*dt;
if(o.x<-120){this.obstacles.splice(i,1);continue}
// Player hitbox: centered at player.x, width 20, from (y-h) to y
const pr=this.player.x+10,pl=this.player.x-10;
const pb=this.player.y;           // feet (FLOOR when grounded)
const pt=this.player.y-this.player.h; // head

// Only check collision if obstacle overlaps player horizontally
if(pr>o.x && pl<o.x+o.w){
  if(o.type==='gap'){
    // Die only if player feet are at floor level (not jumping)
    if(pb>=FLOOR-2 && !this.player.isJumping){this.triggerRunDeath();return}
  }
  else if(o.type==='low'){
    // Low barrier sits on floor, height=o.h. Player must JUMP over it.
    // Kill if player's feet are below the top of the barrier
    const barrierTop=FLOOR-o.h;
    if(pb>barrierTop){this.triggerRunDeath();return}
  }
  else if(o.type==='high'){
    // High barrier hangs from above. Player must SLIDE under it.
    // The gap below the barrier is FLOOR-30 to FLOOR (slide height=28)
    // Kill if player's head is above the gap (not sliding low enough)
    const clearanceY=FLOOR-32; // must be below this to survive
    if(pt<clearanceY && !this.player.isSliding){this.triggerRunDeath();return}
  }
}
}
// Orbs
for(let i=this.orbs.length-1;i>=0;i--){
let orb=this.orbs[i];orb.x-=speed*dt;
if(orb.active&&Math.abs(this.player.x-orb.x)<25&&Math.abs((this.player.y-this.player.h/2)-orb.y)<25){orb.active=false;this.orbCount++;storage.addSP(5);this.vfx.burst(orb.x,orb.y,'#00d4ff',8)}
if(orb.x<-50)this.orbs.splice(i,1);
}
}

triggerRunDeath(){
this.gameOver=true;this.state='gameover';
this.vfx.burst(this.player.x,this.player.y-25,'#ffffff',20);this.vfx.shake(10,0.3);
document.getElementById('run-ui').style.display='none';
setTimeout(()=>{Screens.hud.style.display='none';Screens.result.classList.add('active');document.getElementById('result-title').textContent='KILLED';document.getElementById('result-msg').textContent='THE CORRIDOR CLAIMED YOU';document.getElementById('result-sp').textContent='+'+this.orbCount*5+' SP'},1200);
}

// ═══ ARENA ═══
startArena(){
const texts=['IT IS WATCHING YOU','IT REMEMBERS YOUR FACE','IT LEARNED FROM YOU','IT HAS STUDIED YOU','YOU CROSSED EVERY OBSTACLE.\nYOU FOUGHT EVERY ROOM.\nI WAS WATCHING.\nNOW FINISH IT.'];
this.showCinematic(texts[this.zone-1]||'PREPARE',()=>{
this.state='arena';this.gameOver=false;
this.player.x=150;this.player.y=FLOOR;this.player.action=ACT.IDLE;this.player.vx=0;this.player.attackCooldown=0;this.player.dodgeCooldown=0;this.player.isDefending=false;this.player.health=100;this.player.isSliding=false;this.player.isJumping=false;
this.phantom.x=W-150;this.phantom.y=FLOOR;this.phantom.health=100;this.phantom.action=ACT.IDLE;this.phantom.attackCooldown=0;this.phantom.vx=0;this.phantom.isDefending=false;
this.ai.arenaLevel=this.zone;this.ai.timer=2;
this.rageActive=false;this.rageTimer=0;this.player.speedMult=1;this.player.dmgMult=1;
document.getElementById('rage-overlay').classList.remove('active');
document.getElementById('run-ui').style.display='none';
document.querySelectorAll('.hp-container').forEach(e=>e.style.display='flex');
document.querySelector('.corruption-container').style.display='block';

document.getElementById('player-hp').style.width='100%';document.getElementById('phantom-hp').style.width='100%';
})}

updateArena(dt){
if(this.gameOver)return;
let dx=0;
if(this.input.wantLeft())dx=-1;
if(this.input.wantRight())dx=1;
this.player.vx=dx;
this.player.isDefending=this.input.wantSlide();
if(!this.player.isDefending&&this.input.wantJump()&&this.player.attackCooldown<=0){
this.player.action=ACT.ATTACK;this.player.attackCooldown=0.4;
storage.state.phantomProfile.attackCounts.push(Date.now());
}else if(!this.player.isDefending&&this.input.wantDash()&&this.player.dodgeCooldown<=0){
this.player.action=ACT.DODGE;
const dd=dx!==0?Math.sign(dx)*90:(this.player.x<W/2?90:-90);
this.player.x+=dd;this.player.dodgeCooldown=0.8;
if(dd<0)storage.state.phantomProfile.dodgeLeft++;else storage.state.phantomProfile.dodgeRight++;
}else if(this.player.attackCooldown<=0){this.player.action=ACT.IDLE}
if(this.player.isDefending)storage.state.phantomProfile.blockCount+=dt*10;

// Rage
if(!this.rageActive&&this.player.health<=25&&this.rageTimer<=0){
this.rageActive=true;this.rageTimer=10;storage.state.phantomProfile.rageActivations++;
this.player.speedMult=1.4;this.player.dmgMult=1.5;document.getElementById('rage-overlay').classList.add('active');document.getElementById('rage-alert').classList.add('active');
}
if(this.rageActive){this.rageTimer-=dt;if(this.rageTimer<=0){this.rageActive=false;this.rageTimer=-3;this.player.speedMult=0.8;this.player.dmgMult=1;document.getElementById('rage-overlay').classList.remove('active');document.getElementById('rage-alert').classList.remove('active')}}
else if(this.rageTimer<0){this.rageTimer+=dt;if(this.rageTimer>=0){this.player.speedMult=1;this.rageTimer=0}}

this.player.updateArena(dt);this.ai.update(dt);this.phantom.updateArena(dt);
this.checkCombat();
}

checkCombat(){
if(this.gameOver)return;
if(Math.abs(this.player.x-this.phantom.x)<55){
if(this.player.action===ACT.ATTACK&&this.player.attackCooldown>0.3){this.phantom.takeDamage(this.player.totalDmg);this.vfx.shake(6,0.15);this.vfx.burst(this.phantom.x,this.phantom.y-30,'#e94560',6);this.player.action=ACT.IDLE}
if(this.phantom.action===ACT.ATTACK&&this.phantom.attackCooldown>0.3){this.player.takeDamage(this.phantom.totalDmg);this.vfx.shake(6,0.15);this.vfx.burst(this.player.x,this.player.y-30,'#ffffff',6);this.phantom.action=ACT.IDLE}
}
document.getElementById('player-hp').style.width=this.player.health+'%';
document.getElementById('phantom-hp').style.width=this.phantom.health+'%';

if(this.phantom.health<=0){
this.gameOver=true;this.player.action=ACT.IDLE;this.player.attackCooldown=0;
this.vfx.burst(this.phantom.x,this.phantom.y-25,'#e94560',30);this.vfx.shake(12,0.4);
storage.state.phantomProfile.roundsObserved++;storage.addSP(30);
if(!this.rageActive)storage.addSP(40);
if(this.zone>=5){storage.addSP(200);this.triggerArenaOver(true)}
else{this.zone++;const wt=['IT SAW EVERYTHING','IT FELT THAT','IT SAW WHAT YOU DID','YOU ALWAYS DO THAT'][this.zone-2]||'CLEAR';setTimeout(()=>this.showCinematic(wt,()=>this.startRunZone()),1500)}
}else if(this.player.health<=0){
this.gameOver=true;this.player.action=ACT.IDLE;this.player.attackCooldown=0;
this.vfx.burst(this.player.x,this.player.y-25,'#ffffff',30);this.vfx.shake(12,0.4);
storage.addSP(10);this.triggerArenaOver(false);
}
}

triggerArenaOver(won){
this.state='gameover';document.getElementById('rage-overlay').classList.remove('active');document.getElementById('rage-alert').classList.remove('active');
const sp=won?(this.zone>=5?270:30+(this.rageActive?0:40)):10;
setTimeout(()=>{Screens.hud.style.display='none';Screens.result.classList.add('active');
document.getElementById('result-title').textContent=won?(this.zone>=5?'THE MIRROR SHATTERS':'ARENA CLEAR'):'DEFEATED';
document.getElementById('result-msg').textContent=won?"GOOD. YOU FINALLY SURPRISED ME.":"YOU TAUGHT ME EVERYTHING.";
document.getElementById('result-sp').textContent='+'+sp+' SP';
storage.logMatch(won)},2000);
}

// ═══ UPDATE & RENDER ═══
update(time){
const dt=Math.min((time-this.lastTime)/1000,0.08);this.lastTime=time;
this.vfx.update(dt);
if(this.state==='run')this.updateRun(dt);
else if(this.state==='arena')this.updateArena(dt);
}

render(){
ctx.clearRect(0,0,W,H);ctx.save();this.vfx.applyShake(ctx);

if(this.state==='run'){
// Sky gradient
const grd=ctx.createLinearGradient(0,0,0,FLOOR);grd.addColorStop(0,'#050510');grd.addColorStop(1,'#0a0a18');
ctx.fillStyle=grd;ctx.fillRect(0,0,W,FLOOR);
// Parallax city
drawParallax(ctx,this.bgOff);
// Floor
ctx.fillStyle='#1a1a2e';ctx.fillRect(0,FLOOR,W,H-FLOOR);
ctx.strokeStyle='rgba(233,69,96,0.3)';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(0,FLOOR);ctx.lineTo(W,FLOOR);ctx.stroke();
// Speed lines
ctx.strokeStyle='rgba(255,255,255,0.06)';
for(let i=0;i<12;i++){let lx=(i*75-(this.bgOff*0.8)%75);ctx.beginPath();ctx.moveTo(lx,FLOOR);ctx.lineTo(lx-30,FLOOR+40);ctx.stroke()}
// Obstacles
this.obstacles.forEach(o=>{
if(o.type==='gap'){
ctx.fillStyle='#050510';ctx.fillRect(o.x,FLOOR-3,o.w,H-FLOOR+3);
ctx.strokeStyle='rgba(233,69,96,0.4)';ctx.lineWidth=1;
ctx.beginPath();ctx.moveTo(o.x,FLOOR);ctx.lineTo(o.x,H);ctx.stroke();
ctx.beginPath();ctx.moveTo(o.x+o.w,FLOOR);ctx.lineTo(o.x+o.w,H);ctx.stroke();
}else if(o.type==='low'){
ctx.fillStyle='#111125';ctx.fillRect(o.x,FLOOR-o.h,o.w,o.h);
ctx.strokeStyle='rgba(255,255,255,0.15)';ctx.lineWidth=1;ctx.strokeRect(o.x,FLOOR-o.h,o.w,o.h);
}else if(o.type==='high'){
ctx.fillStyle='#111125';ctx.fillRect(o.x,o.y,o.w,o.h);
ctx.strokeStyle='rgba(255,255,255,0.15)';ctx.lineWidth=1;ctx.strokeRect(o.x,o.y,o.w,o.h);
}
});
// Orbs
this.orbs.forEach(orb=>{if(orb.active){ctx.fillStyle='#00d4ff';ctx.shadowColor='#00d4ff';ctx.shadowBlur=12;ctx.beginPath();ctx.arc(orb.x,orb.y,5,0,Math.PI*2);ctx.fill();ctx.shadowBlur=0}});
// Zone 5 phantom shadow
if(this.zone===5){
ctx.globalAlpha=0.15;
drawStickFigure(ctx,this.player.x+40,this.player.y,{color:'#e94560',runCycle:this.player.runCycle*1.1,scale:1});
ctx.globalAlpha=1;
}
// Player
if(!this.gameOver)this.player.draw(ctx,false);
}
else if(this.state==='arena'){
// Arena background
ctx.fillStyle='#08080f';ctx.fillRect(0,0,W,H);
// Dim city backdrop
ctx.globalAlpha=0.3;drawParallax(ctx,this.bgOff);ctx.globalAlpha=1;
// Floor
ctx.fillStyle='#12121f';ctx.fillRect(0,FLOOR,W,H-FLOOR);
ctx.strokeStyle='rgba(233,69,96,0.2)';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(0,FLOOR);ctx.lineTo(W,FLOOR);ctx.stroke();
// Arena walls
ctx.strokeStyle='rgba(255,255,255,0.05)';ctx.lineWidth=1;
ctx.beginPath();ctx.moveTo(20,50);ctx.lineTo(20,FLOOR);ctx.stroke();
ctx.beginPath();ctx.moveTo(W-20,50);ctx.lineTo(W-20,FLOOR);ctx.stroke();
// Fighters
if(this.player.health>0)this.player.draw(ctx,false);
if(this.phantom.health>0)this.phantom.draw(ctx,true);
}

this.vfx.draw(ctx);ctx.restore();
}

loop(time){this.update(time);this.render();this.raf=requestAnimationFrame(t=>this.loop(t))}
}

const engine=new GameMaster();
</script>
